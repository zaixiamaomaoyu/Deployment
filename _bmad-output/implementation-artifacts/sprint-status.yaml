# 状态定义:
# ==================
# Epic 状态:
#   - 待开发: Epic 尚未开始
#   - 进行中: Epic 正在开发中
#   - 已完成: Epic 下所有 Story 已完成
#
# Epic 状态转换:
#   - 待开发 → 进行中: 当第一个 Story 文件创建时自动转换
#   - 进行中 → 已完成: 当所有 Story 达到 '已完成' 状态时手动标记
#
# Story 状态:
#   - 待开发: Story 仅存在于 Epic 文件中
#   - 准备开发: Story 文件已创建在 stories 文件夹
#   - 开发中: 开发者正在实现中
#   - 代码审查: 准备进行代码审查
#   - 已完成: Story 开发完成
#
# 回顾状态:
#   - 可选: 可以完成但非必须
#   - 已完成: 回顾已完成
#
# 工作流说明:
# ===============
# - 当第一个 Story 创建时，Epic 自动转为 '进行中'
# - 如果团队资源允许，可以并行开发多个 Story
# - 通常在上一个 Story '已完成' 后创建下一个 Story
# - 开发者将 Story 移至 '代码审查'，然后运行代码审查流程

